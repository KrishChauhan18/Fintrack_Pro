<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack Pro</title>
    <link rel="stylesheet" href="./main.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

    <main>
        <div id="left">
            <div id="logo">
                <div class="logo-icon">
                    <i class="ri-stack-fill"></i>
                </div>
                <div class="logo-text">
                    <h2>FinTrack Pro</h2>
                    <p>Enterprise Finance</p>
                </div>
            </div>

            <div id="button2">
                <button>
                    <i class="ri-dashboard-horizontal-fill icon"></i>
                    Dashboard
                </button>
                <button>
                    <i class="ri-settings-3-fill icon"></i>
                    Settings
                </button>
            </div>

            <div id="add_trans">
                <button>+ Add Transaction</button>
            </div>
        </div>

        <div id="right">
            <div id="righttop">
                <div class="topbar">
                    <div id="usernameshow"></div>
                    <button id="logout">
                        <i class="ri-logout-box-r-line"></i>
                        Logout
                    </button>
                </div>
            </div>

            <div id="right-main">
                <h1>Financial Overview</h1>
                <p id="para">Real-time tracking application</p>

                <div class="cards">
                    <div class="card">
                        <div class="cardicon" id="first">
                            <i class="ri-bank-fill"></i>
                        </div>
                        <div class="cardtext">
                            <p>Current Balance</p>
                            <h2 id="first-h">$0.00</h2>
                        </div>
                    </div>

                    <div class="card">
                        <div class="cardicon" id="second">
                            <i class="ri-arrow-right-up-line"></i>
                        </div>
                        <div class="cardtext">
                            <p>Total Income</p>
                            <h2 id="second-h">$0.00</h2>
                        </div>
                    </div>

                    <div class="card">
                        <div class="cardicon" id="third">
                            <i class="ri-arrow-right-down-line"></i>
                        </div>
                        <div class="cardtext">
                            <p>Total Expenses</p>
                            <h2 id="third-h">$0.00</h2>
                        </div>
                    </div>

                    <div class="card">
                        <div class="cardicon" id="fourth">
                            <i class="ri-money-dollar-circle-line"></i>
                        </div>
                        <div class="cardtext">
                            <p>Total Transactions</p>
                            <h2 id="fourth-h">0</h2>
                        </div>
                    </div>
                </div>
            </div>

            <div id="right-middle">
                <div id="leftt">
                     <h1>Cash Flow Analysis</h1>
                     <!-- The essential missing element from image_6d4322.png -->
                     <div id="analysis">
                         <canvas id="cashFlowChart"></canvas>
                     </div>
                </div>

                <div class="preferences-card">
                    <h2>Preferences</h2>
                    <div class="preference-item">
                        <span>Dark Mode</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="themeToggleCheckbox" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <hr class="divider">
                    <button class="reset-button" id="resetDataBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M17 6H22V8H20V21C20 21.5523 19.5523 22 19 22H5C4.44772 22 4 21.5523 4 21V8H2V6H7V3C7 2.44772 7.44772 2 8 2H16C16.5523 2 17 2.44772 17 3V6ZM18 8H6V20H18V8ZM9 11H11V17H9V11ZM13 11H15V17H13V11ZM9 4V6H15V4H9Z"></path>
                        </svg>
                        Reset All Data
                    </button>
                </div>
            </div>

            <div class="right-last">
                <div class="transactions-card">
                    <h2>All Transactions</h2>
                    <div class="controls-container">
                        <div class="search-wrapper">
                            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            <input type="text" id="searchInput" placeholder="Search transactions..." class="search-input">
                        </div>
            
                        <div class="select-wrapper">
                            <select id="filterSelect" class="filter-select">
                                <option value="All">All</option>
                                <option value="Income">Income Only</option>
                                <option value="Expense">Expense Only</option>
                            </select>
                        </div>
                    </div>
          
                    <table class="transactions-table">
                        <thead>
                            <tr>
                                <th style="width: 20%;">Date</th>
                                <th style="width: 25%;">Description</th>
                                <th style="width: 23%;">Category</th>
                                <th style="width: 18%;">Amount</th>
                                <th style="width: 14%;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="transactionsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="transactionModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Add Transaction</h2>
                    <span id="closeModal">&times;</span>
                </div>

                <form id="transactionForm">
                    <div class="input-box">
                        <label for="description">Description</label>
                        <input type="text" id="description" placeholder="Enter description" required>
                    </div>

                    <div class="input-box">
                        <label for="amount">Amount ($)</label>
                        <input type="number" step="0.01" id="amount" placeholder="Enter amount" required>
                    </div>

                    <div class="input-box">
                        <label for="category">Category</label>
                        <input type="text" id="category" placeholder="Food, Salary..." required>
                    </div>

                    <div class="input-box">
                        <label for="type">Type</label>
                        <select id="type">
                            <option value="Income">Income</option>
                            <option value="Expense">Expense</option>
                        </select>
                    </div>

                    <button type="submit">Save Transaction</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Essential: Script CDN must load BEFORE your main logic execution -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="./main.js"></script>
</body>
</html>
